<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 854 250" fill="none">
<defs>
  <linearGradient id="tg" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#e6edf3"><animate attributeName="stop-color" values="#e6edf3;#c4b5fd;#e6edf3" dur="8s" repeatCount="indefinite"/></stop>
    <stop offset="100%" stop-color="#c9d1d9"><animate attributeName="stop-color" values="#c9d1d9;#e6edf3;#c9d1d9" dur="8s" repeatCount="indefinite"/></stop>
  </linearGradient>
  <linearGradient id="ba" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
    <stop offset="20%" stop-color="#58a6ff" stop-opacity="0.4"><animate attributeName="stop-color" values="#58a6ff;#a78bfa;#58a6ff" dur="6s" repeatCount="indefinite"/></stop>
    <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.4"><animate attributeName="stop-color" values="#a78bfa;#67e8f9;#a78bfa" dur="6s" repeatCount="indefinite"/></stop>
    <stop offset="80%" stop-color="#67e8f9" stop-opacity="0.4"><animate attributeName="stop-color" values="#67e8f9;#58a6ff;#67e8f9" dur="6s" repeatCount="indefinite"/></stop>
    <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="sl" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
    <stop offset="30%" stop-color="#58a6ff" stop-opacity="1"/>
    <stop offset="70%" stop-color="#a78bfa" stop-opacity="1"/>
    <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="vg" cx="0.38" cy="0.48" r="0.72">
    <stop offset="0%" stop-color="#0a0c10" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
  </radialGradient>
  <path id="p1" d="M540,8 L640,18 L730,12 L810,28 L835,60 L815,95"/>
  <path id="p2" d="M400,230 L290,238 L180,228 L80,240 L30,210 L42,160"/>
  <path id="p3" d="M680,70 L815,95 L750,140 L830,135 L805,175"/>
</defs>

<!-- Background -->
<rect width="854" height="250" fill="#0a0c10" rx="6" stroke="#161b22" stroke-width="1"/>
<rect width="854" height="250" fill="url(#vg)" rx="6"/>

<!-- Scan line -->
<rect x="0" y="-2" width="854" height="2" fill="url(#sl)" opacity="0.025" rx="1">
  <animate attributeName="y" values="-2;252" dur="10s" repeatCount="indefinite"/>
</rect>

<!-- ── Static connections ── -->
<g stroke="#1a1f2e" stroke-width="0.5" opacity="0.55">
  <!-- Upper arc -->
  <line x1="55" y1="22" x2="135" y2="10"/><line x1="135" y1="10" x2="220" y2="28"/>
  <line x1="220" y1="28" x2="330" y2="14"/><line x1="330" y1="14" x2="430" y2="25"/>
  <line x1="430" y1="25" x2="540" y2="8"/><line x1="540" y1="8" x2="640" y2="18"/>
  <line x1="640" y1="18" x2="730" y2="12"/><line x1="730" y1="12" x2="810" y2="28"/>
  <!-- Right side -->
  <line x1="810" y1="28" x2="835" y2="60"/><line x1="835" y1="60" x2="815" y2="95"/>
  <line x1="815" y1="95" x2="830" y2="135"/><line x1="830" y1="135" x2="805" y2="175"/>
  <line x1="805" y1="175" x2="825" y2="215"/>
  <!-- Bottom arc -->
  <line x1="825" y1="215" x2="730" y2="235"/><line x1="730" y1="235" x2="630" y2="225"/>
  <line x1="630" y1="225" x2="520" y2="240"/><line x1="520" y1="240" x2="400" y2="230"/>
  <line x1="400" y1="230" x2="290" y2="238"/><line x1="290" y1="238" x2="180" y2="228"/>
  <line x1="180" y1="228" x2="80" y2="240"/>
  <!-- Left side -->
  <line x1="80" y1="240" x2="30" y2="210"/><line x1="30" y1="210" x2="42" y2="160"/>
  <line x1="42" y1="160" x2="22" y2="110"/><line x1="22" y1="110" x2="38" y2="65"/>
  <line x1="38" y1="65" x2="55" y2="22"/>
  <!-- Cross-connections -->
  <line x1="540" y1="8" x2="680" y2="70"/><line x1="680" y1="70" x2="815" y2="95"/>
  <line x1="815" y1="95" x2="750" y2="140"/><line x1="750" y1="140" x2="830" y2="135"/>
  <line x1="730" y1="12" x2="680" y2="70"/><line x1="750" y1="140" x2="805" y2="175"/>
  <line x1="400" y1="230" x2="42" y2="160"/><line x1="220" y1="28" x2="38" y2="65"/>
  <line x1="630" y1="225" x2="750" y2="140"/>
</g>

<!-- ── Pulse connections (animated data flow) ── -->
<g>
  <line x1="540" y1="8" x2="680" y2="70" stroke="#58a6ff" stroke-width="0.5" stroke-dasharray="4,16" stroke-opacity="0.3">
    <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="680" y1="70" x2="815" y2="95" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="3,14" stroke-opacity="0.25">
    <animate attributeName="stroke-dashoffset" from="0" to="-17" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="400" y1="230" x2="42" y2="160" stroke="#67e8f9" stroke-width="0.5" stroke-dasharray="3,18" stroke-opacity="0.2">
    <animate attributeName="stroke-dashoffset" from="0" to="-21" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="750" y1="140" x2="805" y2="175" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="2,12" stroke-opacity="0.2">
    <animate attributeName="stroke-dashoffset" from="0" to="-14" dur="2.8s" repeatCount="indefinite"/>
  </line>
  <line x1="630" y1="225" x2="750" y2="140" stroke="#58a6ff" stroke-width="0.5" stroke-dasharray="3,16" stroke-opacity="0.18">
    <animate attributeName="stroke-dashoffset" from="0" to="-19" dur="3.5s" repeatCount="indefinite"/>
  </line>
</g>

<!-- ── Regular nodes ── -->
<g fill="#374151">
  <circle cx="55" cy="22" r="1"><animate attributeName="opacity" values="0.3;0.55;0.3" dur="7s" repeatCount="indefinite"/></circle>
  <circle cx="135" cy="10" r="1.2"><animate attributeName="opacity" values="0.25;0.5;0.25" dur="9s" repeatCount="indefinite"/></circle>
  <circle cx="220" cy="28" r="1"><animate attributeName="opacity" values="0.3;0.5;0.3" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="330" cy="14" r="1.1"><animate attributeName="opacity" values="0.25;0.55;0.25" dur="8s" repeatCount="indefinite"/></circle>
  <circle cx="430" cy="25" r="1"><animate attributeName="opacity" values="0.3;0.5;0.3" dur="7s" repeatCount="indefinite"/></circle>
  <circle cx="640" cy="18" r="1.1"><animate attributeName="opacity" values="0.25;0.55;0.25" dur="8s" repeatCount="indefinite"/></circle>
  <circle cx="730" cy="12" r="1"><animate attributeName="opacity" values="0.3;0.5;0.3" dur="9s" repeatCount="indefinite"/></circle>
  <circle cx="810" cy="28" r="1.2"><animate attributeName="opacity" values="0.25;0.5;0.25" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="835" cy="60" r="1"><animate attributeName="opacity" values="0.3;0.55;0.3" dur="7s" repeatCount="indefinite"/></circle>
  <circle cx="830" cy="135" r="1.1"><animate attributeName="opacity" values="0.25;0.5;0.25" dur="8s" repeatCount="indefinite"/></circle>
  <circle cx="805" cy="175" r="1"><animate attributeName="opacity" values="0.3;0.55;0.3" dur="9s" repeatCount="indefinite"/></circle>
  <circle cx="825" cy="215" r="1.2"><animate attributeName="opacity" values="0.25;0.5;0.25" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="730" cy="235" r="1"><animate attributeName="opacity" values="0.3;0.55;0.3" dur="7s" repeatCount="indefinite"/></circle>
  <circle cx="630" cy="225" r="1.1"><animate attributeName="opacity" values="0.25;0.5;0.25" dur="8s" repeatCount="indefinite"/></circle>
  <circle cx="520" cy="240" r="1"><animate attributeName="opacity" values="0.3;0.5;0.3" dur="9s" repeatCount="indefinite"/></circle>
  <circle cx="290" cy="238" r="1.1"><animate attributeName="opacity" values="0.25;0.55;0.25" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="180" cy="228" r="1"><animate attributeName="opacity" values="0.3;0.5;0.3" dur="7s" repeatCount="indefinite"/></circle>
  <circle cx="80" cy="240" r="1.2"><animate attributeName="opacity" values="0.25;0.5;0.25" dur="8s" repeatCount="indefinite"/></circle>
  <circle cx="30" cy="210" r="1"><animate attributeName="opacity" values="0.3;0.55;0.3" dur="9s" repeatCount="indefinite"/></circle>
  <circle cx="42" cy="160" r="1.1"><animate attributeName="opacity" values="0.25;0.5;0.25" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="22" cy="110" r="1"><animate attributeName="opacity" values="0.3;0.55;0.3" dur="7s" repeatCount="indefinite"/></circle>
  <circle cx="38" cy="65" r="1.2"><animate attributeName="opacity" values="0.25;0.5;0.25" dur="8s" repeatCount="indefinite"/></circle>
  <circle cx="680" cy="70" r="1.1"><animate attributeName="opacity" values="0.3;0.55;0.3" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="750" cy="140" r="1"><animate attributeName="opacity" values="0.25;0.5;0.25" dur="7s" repeatCount="indefinite"/></circle>
</g>

<!-- ── Bright node 1: regulation (upper) — blue ── -->
<circle cx="540" cy="8" r="5" fill="#58a6ff" opacity="0.04"/>
<circle cx="540" cy="8" fill="none" stroke="#58a6ff" stroke-width="0.5">
  <animate attributeName="r" values="3;16" dur="5s" repeatCount="indefinite"/>
  <animate attributeName="stroke-opacity" values="0.18;0" dur="5s" repeatCount="indefinite"/>
</circle>
<circle cx="540" cy="8" fill="none" stroke="#58a6ff" stroke-width="0.3">
  <animate attributeName="r" values="3;16" dur="5s" begin="2.5s" repeatCount="indefinite"/>
  <animate attributeName="stroke-opacity" values="0.1;0" dur="5s" begin="2.5s" repeatCount="indefinite"/>
</circle>
<circle cx="540" cy="8" r="2" fill="#58a6ff">
  <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3s" repeatCount="indefinite"/>
</circle>

<!-- ── Bright node 2: security (right) — purple ── -->
<circle cx="815" cy="95" r="5" fill="#a78bfa" opacity="0.035"/>
<circle cx="815" cy="95" fill="none" stroke="#a78bfa" stroke-width="0.5">
  <animate attributeName="r" values="3;14" dur="4.5s" repeatCount="indefinite"/>
  <animate attributeName="stroke-opacity" values="0.16;0" dur="4.5s" repeatCount="indefinite"/>
</circle>
<circle cx="815" cy="95" fill="none" stroke="#a78bfa" stroke-width="0.3">
  <animate attributeName="r" values="3;14" dur="4.5s" begin="2.25s" repeatCount="indefinite"/>
  <animate attributeName="stroke-opacity" values="0.08;0" dur="4.5s" begin="2.25s" repeatCount="indefinite"/>
</circle>
<circle cx="815" cy="95" r="2" fill="#a78bfa">
  <animate attributeName="opacity" values="0.45;0.85;0.45" dur="3.5s" repeatCount="indefinite"/>
</circle>

<!-- ── Bright node 3: intelligence (lower) — cyan ── -->
<circle cx="400" cy="230" r="5" fill="#67e8f9" opacity="0.03"/>
<circle cx="400" cy="230" fill="none" stroke="#67e8f9" stroke-width="0.5">
  <animate attributeName="r" values="3;15" dur="5.5s" repeatCount="indefinite"/>
  <animate attributeName="stroke-opacity" values="0.14;0" dur="5.5s" repeatCount="indefinite"/>
</circle>
<circle cx="400" cy="230" fill="none" stroke="#67e8f9" stroke-width="0.3">
  <animate attributeName="r" values="3;15" dur="5.5s" begin="2.75s" repeatCount="indefinite"/>
  <animate attributeName="stroke-opacity" values="0.07;0" dur="5.5s" begin="2.75s" repeatCount="indefinite"/>
</circle>
<circle cx="400" cy="230" r="2" fill="#67e8f9">
  <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
</circle>

<!-- ── Pulse wave 1: upper-right propagation (12s cycle) ── -->
<g>
  <circle cx="640" cy="18" r="1.8" fill="#58a6ff" opacity="0">
    <animate attributeName="opacity" values="0;0;0.7;0;0" keyTimes="0;0.025;0.055;0.09;1" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="730" cy="12" r="1.8" fill="#58a6ff" opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0;0" keyTimes="0;0.055;0.085;0.12;1" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="810" cy="28" r="1.8" fill="#58a6ff" opacity="0">
    <animate attributeName="opacity" values="0;0;0.5;0;0" keyTimes="0;0.085;0.115;0.15;1" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="835" cy="60" r="1.8" fill="#a78bfa" opacity="0">
    <animate attributeName="opacity" values="0;0;0.4;0;0" keyTimes="0;0.115;0.145;0.18;1" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="815" cy="95" r="2.5" fill="#a78bfa" opacity="0">
    <animate attributeName="opacity" values="0;0;0.5;0;0" keyTimes="0;0.145;0.175;0.22;1" dur="12s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- ── Pulse wave 2: lower-left propagation (12s cycle, offset 6s) ── -->
<g>
  <circle cx="290" cy="238" r="1.8" fill="#67e8f9" opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0;0" keyTimes="0;0.525;0.555;0.59;1" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="228" r="1.8" fill="#67e8f9" opacity="0">
    <animate attributeName="opacity" values="0;0;0.5;0;0" keyTimes="0;0.555;0.585;0.62;1" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="240" r="1.8" fill="#67e8f9" opacity="0">
    <animate attributeName="opacity" values="0;0;0.45;0;0" keyTimes="0;0.585;0.615;0.65;1" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="210" r="1.8" fill="#58a6ff" opacity="0">
    <animate attributeName="opacity" values="0;0;0.35;0;0" keyTimes="0;0.615;0.645;0.68;1" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="42" cy="160" r="2.2" fill="#58a6ff" opacity="0">
    <animate attributeName="opacity" values="0;0;0.4;0;0" keyTimes="0;0.645;0.675;0.72;1" dur="12s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- ── Traveling dots with ghosts ── -->
<circle r="1.3" fill="#58a6ff" opacity="0.55">
  <animateMotion dur="6s" repeatCount="indefinite"><mpath href="#p1"/></animateMotion>
  <animate attributeName="opacity" values="0.55;0.15;0.55" dur="6s" repeatCount="indefinite"/>
</circle>
<circle r="0.7" fill="#58a6ff" opacity="0.2">
  <animateMotion dur="6s" begin="0.7s" repeatCount="indefinite"><mpath href="#p1"/></animateMotion>
  <animate attributeName="opacity" values="0.2;0.05;0.2" dur="6s" begin="0.7s" repeatCount="indefinite"/>
</circle>

<circle r="1.1" fill="#67e8f9" opacity="0.45">
  <animateMotion dur="8s" repeatCount="indefinite"><mpath href="#p2"/></animateMotion>
  <animate attributeName="opacity" values="0.45;0.1;0.45" dur="8s" repeatCount="indefinite"/>
</circle>
<circle r="0.6" fill="#67e8f9" opacity="0.15">
  <animateMotion dur="8s" begin="0.9s" repeatCount="indefinite"><mpath href="#p2"/></animateMotion>
  <animate attributeName="opacity" values="0.15;0.03;0.15" dur="8s" begin="0.9s" repeatCount="indefinite"/>
</circle>

<circle r="0.9" fill="#a78bfa" opacity="0.4">
  <animateMotion dur="7s" repeatCount="indefinite"><mpath href="#p3"/></animateMotion>
  <animate attributeName="opacity" values="0.4;0.1;0.4" dur="7s" repeatCount="indefinite"/>
</circle>
<circle r="0.5" fill="#a78bfa" opacity="0.12">
  <animateMotion dur="7s" begin="0.6s" repeatCount="indefinite"><mpath href="#p3"/></animateMotion>
  <animate attributeName="opacity" values="0.12;0.02;0.12" dur="7s" begin="0.6s" repeatCount="indefinite"/>
</circle>

<!-- ── Typography ── -->
<text x="60" y="100" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="52" font-weight="700" fill="url(#tg)" letter-spacing="-0.5">0x-YB</text>
<text x="60" y="148" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Noto Sans, Helvetica, Arial, sans-serif" font-size="15" fill="#8b949e" letter-spacing="0.2">Interested in the structures that govern digital systems</text>
<text x="60" y="170" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Noto Sans, Helvetica, Arial, sans-serif" font-size="15" fill="#7d8590" letter-spacing="0.2">— and the systems that govern structures.</text>

<!-- Bottom accent (synced with waves) -->
<rect x="0" y="248" width="854" height="2" fill="url(#ba)" rx="1">
  <animate attributeName="opacity" values="0.35;0.35;0.6;0.35;0.35;0.35;0.6;0.35" keyTimes="0;0.02;0.06;0.18;0.50;0.52;0.56;1" dur="12s" repeatCount="indefinite"/>
</rect>
</svg>